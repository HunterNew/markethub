<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Cart body -->
  <circle cx="24" cy="22" r="18" stroke="url(#grad1)" stroke-width="3" fill="none"/>
  <!-- Arrow/speed indicator -->
  <path d="M32 10 L40 6 L36 14 L32 10Z" fill="#f97316"/>
  <!-- Speed lines -->
  <line x1="4" y1="18" x2="10" y2="18" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="22" x2="9" y2="22" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="26" x2="10" y2="26" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round"/>
  <!-- Cart handle -->
  <path d="M15 34 L18 38" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M33 34 L30 38" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cart wheels -->
  <circle cx="19" cy="40" r="2.5" fill="#1e3a5f"/>
  <circle cx="29" cy="40" r="2.5" fill="#1e3a5f"/>
  <!-- G letter -->
  <path d="M20 16 C16 16 14 19 14 22 C14 25 16 28 20 28 L26 28 L26 23 L22 23" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
</svg>
