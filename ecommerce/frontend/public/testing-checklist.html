<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketHub — Testing Checklist</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 8px; }
.subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
.progress-bar { background: #e9ecef; border-radius: 8px; height: 12px; margin-bottom: 24px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, #f97316, #ea580c); height: 100%; border-radius: 8px; transition: width 0.3s; }
.progress-text { text-align: center; font-size: 13px; color: #666; margin-bottom: 16px; }
.section { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 16px; overflow: hidden; }
.section-header { padding: 14px 18px; background: #f8f9fa; border-bottom: 1px solid #e5e7eb; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.section-header:hover { background: #f1f3f5; }
.section-header h2 { font-size: 15px; font-weight: 700; }
.section-header .count { font-size: 12px; color: #888; background: #e9ecef; padding: 2px 8px; border-radius: 10px; }
.section-body { padding: 8px 12px; }
.section-body.collapsed { display: none; }
.item { display: flex; align-items: center; gap: 10px; padding: 8px 6px; border-radius: 6px; transition: background 0.15s; }
.item:hover { background: #f8f9fa; }
.item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f97316; cursor: pointer; flex-shrink: 0; }
.item label { font-size: 13px; cursor: pointer; flex: 1; }
.item.done label { text-decoration: line-through; color: #999; }
.status { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.status.pass { background: #d4edda; color: #155724; }
.status.fail { background: #f8d7da; color: #721c24; }
.actions { display: flex; gap: 8px; margin-bottom: 20px; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #f97316; color: #fff; }
.btn-primary:hover { background: #ea580c; }
.btn-secondary { background: #e9ecef; color: #333; }
.btn-secondary:hover { background: #dee2e6; }
.btn-danger { background: #fee2e2; color: #dc2626; }
.btn-danger:hover { background: #fecaca; }
h3 { font-size: 13px; color: #f97316; font-weight: 700; margin: 16px 0 8px 6px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<h1>🧪 MarketHub Testing Checklist</h1>
<p class="subtitle">Click checkboxes as you test. Progress is saved in your browser.</p>
<div class="progress-text" id="progressText">0 / 0 completed</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="actions">
<button class="btn btn-primary" onclick="expandAll()">Expand All</button>
<button class="btn btn-secondary" onclick="collapseAll()">Collapse All</button>
<button class="btn btn-danger" onclick="resetAll()">Reset All</button>
</div>
<div id="app"></div>

<script>
const DATA = [
  { title: "Authentication & Users", items: [
    "Customer registration with valid data",
    "Vendor registration with store name",
    "Login with correct credentials",
    "Login with wrong password shows error",
    "Protected routes redirect to login",
    "Role-based access (customer can't access vendor pages)",
    "Role-based access (vendor can't access admin pages)",
    "Profile update (name, phone)",
    "Address add/edit/delete/set default",
    "Forgot password - valid email sends reset link",
    "Forgot password - invalid email shows 'create account' message",
    "Reset password - valid token allows password change",
    "Reset password - expired/invalid token shows error",
    "Reset password - redirects to login after success",
  ]},
  { title: "Product Browsing", items: [
    "Homepage loads featured products",
    "Homepage loads on-sale products",
    "Category grid shows all categories with images",
    "Products page shows all active products",
    "Filter by category works",
    "Filter by price range (min only)",
    "Filter by price range (min + max)",
    "Sort by newest/price/popular",
    "Search by product name",
    "Search suggestions appear while typing",
    "Pagination works",
    "Product detail page shows all info",
    "Product images carousel works",
    "Vendor store page shows vendor products",
  ]},
  { title: "Product Variants", items: [
    "Variant selector shows on product with variants",
    "Selecting variant updates displayed price",
    "Selecting variant updates stock display",
    "Out-of-stock variant shows OOS badge and is disabled",
    "Add to Cart disabled until variant selected",
    "Price range shows when no variant selected",
    "Product card shows variant price range in listing",
    "Product card hides quick Add to Cart for variant products",
  ]},
  { title: "Wholesale Pricing", items: [
    "Wholesale info shows on product page when enabled",
    "Price updates when qty meets wholesale minimum",
    "Wholesale discount applied to variant price correctly",
    "Cart shows Wholesale applied badge when qty qualifies",
    "Cart shows Add X more hint when below minimum",
    "Increasing qty in cart triggers wholesale recalculation",
    "Decreasing qty below minimum removes wholesale discount",
    "Checkout shows correct wholesale-discounted total",
  ]},
  { title: "Cart (Guest)", items: [
    "Add product to guest cart",
    "Add variant product stores variant info",
    "Cart page shows variant details",
    "Cart shows correct variant price",
    "Increase/decrease quantity works",
    "Remove item from cart",
    "Clear cart",
    "Guest cart syncs to server after login",
    "Different variants create separate cart items",
  ]},
  { title: "Cart (Logged-in)", items: [
    "Add product to cart via API",
    "Add variant product requires variant selection",
    "Cart shows variant option_combination",
    "Same variant added twice merges quantity",
    "Different variants = separate items",
    "Quantity capped at available stock",
    "Zero-stock variant rejected",
    "Coupon code apply/remove works",
    "Coupon min order amount validation",
  ]},
  { title: "Checkout & Orders", items: [
    "Step 1: address selection/entry",
    "Step 2: payment method selection",
    "Step 3: review shows items with variant info",
    "Review shows delivery address",
    "Review shows price breakdown",
    "Place order (COD) succeeds",
    "Order deducts variant stock",
    "Order stores variant_snapshot",
    "Order rejects if qty > variant stock",
    "Coupon discount applied to order",
    "Cart cleared after order placed",
    "Customer can view order history",
    "Customer can cancel confirmed order",
  ]},
  { title: "Vendor Panel", items: [
    "Vendor dashboard shows stats",
    "Add new product",
    "Edit existing product",
    "Delete product",
    "Upload product image",
    "Enable variants on product",
    "Add option types (max 3)",
    "Generate variant combinations",
    "Set price/stock per variant",
    "Save variants persists to DB",
    "Category suggestions load for variants",
    "CSV import with ₹ prices",
    "CSV import with image filenames",
    "View orders with full details",
    "Mark order shipped/delivered",
    "Create/manage coupons",
  ]},
  { title: "Admin Panel", items: [
    "Admin dashboard shows platform stats",
    "Approve/reject vendor applications",
    "View all orders with full details",
    "Update order status",
    "View all products",
    "Manage platform settings (tax, wholesale)",
    "Commission calculation on delivery",
    "Reports: top products, vendor performance",
  ]},
  { title: "Mobile Responsiveness", items: [
    "Header: hamburger menu works",
    "Header: search in mobile menu",
    "Header: login button visible",
    "Products page: filter drawer slides in/out",
    "Products page: 2-column grid on mobile",
    "Product detail: images, variants, cart button",
    "Cart page: items, quantity controls, summary",
    "Checkout: all steps usable on mobile",
    "Footer: compact layout on mobile",
    "No horizontal scroll on any page",
  ]},
];

const STORAGE_KEY = 'markethub_test_checklist';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function render() {
  const state = loadState();
  const app = document.getElementById('app');
  let totalItems = 0, checkedItems = 0;
  let html = '';

  DATA.forEach((section, si) => {
    const sectionChecked = section.items.filter((_, ii) => state[`${si}-${ii}`]).length;
    totalItems += section.items.length;
    checkedItems += sectionChecked;
    const collapsed = state[`section-${si}-collapsed`] ? 'collapsed' : '';

    html += `<div class="section">
      <div class="section-header" onclick="toggleSection(${si})">
        <h2>${section.title}</h2>
        <span class="count">${sectionChecked}/${section.items.length}</span>
      </div>
      <div class="section-body ${collapsed}">`;

    section.items.forEach((item, ii) => {
      const checked = state[`${si}-${ii}`] ? 'checked' : '';
      const done = state[`${si}-${ii}`] ? 'done' : '';
      html += `<div class="item ${done}">
        <input type="checkbox" id="c${si}-${ii}" ${checked} onchange="toggle(${si},${ii})">
        <label for="c${si}-${ii}">${item}</label>
      </div>`;
    });

    html += `</div></div>`;
  });

  app.innerHTML = html;
  const pct = totalItems > 0 ? Math.round((checkedItems / totalItems) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${checkedItems} / ${totalItems} completed (${pct}%)`;
}

function toggle(si, ii) {
  const state = loadState();
  state[`${si}-${ii}`] = !state[`${si}-${ii}`];
  saveState(state);
  render();
}

function toggleSection(si) {
  const state = loadState();
  state[`section-${si}-collapsed`] = !state[`section-${si}-collapsed`];
  saveState(state);
  render();
}

function expandAll() {
  const state = loadState();
  DATA.forEach((_, si) => { delete state[`section-${si}-collapsed`]; });
  saveState(state);
  render();
}

function collapseAll() {
  const state = loadState();
  DATA.forEach((_, si) => { state[`section-${si}-collapsed`] = true; });
  saveState(state);
  render();
}

function resetAll() {
  if (confirm('Reset all checkboxes? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

render();
</script>
</body>
</html>
